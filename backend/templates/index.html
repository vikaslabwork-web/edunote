<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduNote AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h1>EduNote AI</h1>
  <p>Automated Lecture Processing System</p>

  <div class="card">
    <h3>Select Input Type</h3>
    <select id="inputType">
      <option value="text">Text</option>
      <option value="pdf">PDF/DOCX</option>
      <option value="youtube">YouTube Link</option>
    </select>
  </div>

  <div class="card">
    <h3>Provide Input</h3>
    <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    <input type="file" id="fileInput" hidden>
    <input type="text" id="youtubeInput" placeholder="Paste YouTube link" hidden>
  </div>

  <div class="card">
    <h3>Select Mode</h3>
    <select id="mode">
      <option value="summary">Summary</option>
      <option value="assignment">Assignment</option>
    </select>
  </div>

  <button onclick="submitData()">Generate</button>

  <div class="card output">
    <h3>Output</h3>
    <pre id="result"></pre>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
